{% extends "portfolio/base.html" %}

{% block title %}
Skills
{% endblock %}

{% block content %}

<section>

    <h2 class="title">Skills</h2>

    <div class="skills-container">

        {% for skill in skills %}

        <div class="skill">

            <h3>{{ skill.name }}</h3>

            <p>{{ skill.description }}</p>

        </div>

        {% empty %}

        <p>No skills added yet.</p>

        {% endfor %}

    </div>

</section>

{% endblock %}
